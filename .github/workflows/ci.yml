name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm run test:e2e -- --project=chromium tests/payme.spec.ts

  deploy-stage:
    runs-on: ubuntu-latest
    needs: test
    environment: staging
    outputs:
      stage_url: ${{ steps.stage.outputs.stage_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install --global vercel

      - name: Pull Vercel configuration
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build for Vercel staging
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel staging
        id: stage
        run: |
          output=$(vercel deploy --prebuilt --target=preview --yes --format=json --token=${{ secrets.VERCEL_TOKEN }} --project=${{ secrets.VERCEL_PROJECT_ID }})
          echo "$output"
          echo "stage_url=$(echo "$output" | python -c 'import sys, json; print(json.load(sys.stdin)["url"])')" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  perf-k6:
    runs-on: ubuntu-latest
    needs: deploy-stage
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache k6 installation
        id: k6-cache
        uses: actions/cache@v6
        with:
          path: ~/.k6/bin
          key: k6-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: k6-${{ runner.os }}-

      - name: Install k6
        if: steps.k6-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.k6/bin
          cd ~/.k6/bin
          wget -q https://github.com/grafana/k6/releases/download/v0.50.0/k6-v0.50.0-linux-amd64.tar.gz
          tar xzf k6-v0.50.0-linux-amd64.tar.gz
          mv k6-v0.50.0-linux-amd64/k6 .
          rm -rf k6-v0.50.0-linux-amd64 k6-v0.50.0-linux-amd64.tar.gz
          chmod +x k6

      - name: Add k6 to PATH
        run: echo "$HOME/.k6/bin" >> $GITHUB_PATH

      - name: Run k6 performance job
        env:
          TARGET_URL: ${{ needs.deploy-stage.outputs.stage_url }}
        run: npm run perf:k6

  perf:
    runs-on: ubuntu-latest
    needs: deploy-stage
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Lighthouse perf job
        run: npx @lhci/cli autorun --collect.url=${{ needs.deploy-stage.outputs.stage_url }}

      # - name: Upload Lighthouse artifact
      #   if: always()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: lighthouse-report
      #     path: .lighthouseci/**

  deploy-prod:
    runs-on: ubuntu-latest
    needs: [perf, perf-k6]
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install --global vercel

      - name: Pull Vercel configuration
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build for Vercel production
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

